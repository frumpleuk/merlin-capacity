name = "merlin-capacity"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# --- Custom subdomain. `custom_domain = true` makes `wrangler deploy` create the
#     DNS record and provision the TLS cert in the frumple.co.uk zone (already on
#     Cloudflare). Independent of the apex Hugo site — separate DNS record. ---
routes = [
  { pattern = "themeparks.frumple.co.uk", custom_domain = true }
]

# --- Static frontend (Vite build output; run `npm run build` first).
#     SPA fallback so client-routed deep links (e.g. /alton_towers/rap) resolve. ---
assets = { directory = "./dist", binding = "ASSETS", not_found_handling = "single-page-application" }

# --- Poll cadence. THREE crons, one per data stream, because each cron firing is
#     its own invocation with its own free-tier 10ms CPU budget — running all
#     streams in a single every-minute cron blew that budget (CPU-killed mid-run,
#     freezing queues + main tickets). Streams write separate R2 files; the
#     frontend stitches them. Cloudflare treats each cron STRING as a distinct
#     trigger, so "* * * * *" and "*/1 * * * *" (both "every minute") fire as two
#     separate invocations each minute — that's how tickets AND queues each get a
#     1-min cadence in their own budget. 3 crons = the free-plan per-Worker cap.
#       "* * * * *"   tickets — RAP (1m) + main (5m) + hours (60m) + rebuilds (30m)
#       "*/1 * * * *" queues  — ride waits every minute (own budget)
#       "0-7 7 * * *" pre-open — daily maintenance 08:00–08:07 BST, ONE job/minute
#                     (own budget, parks closed): mins 0-3 bundle unzips, mins 4-7
#                     accesso package discovery (the 2.83MB bootstrap parse, moved
#                     OFF the every-minute ticket poll). Widen if parks are added.
#     Free tier throughout; the limit to watch stays D1's 100k writes/day. ---
[triggers]
crons = ["* * * * *", "*/1 * * * *", "0-7 7 * * *"]

# --- History / source of truth ---
[[d1_databases]]
binding = "DB"
database_name = "merlin-capacity"
database_id = "5e01c308-630f-4409-a303-4262e8f503c5"

# --- Precomputed served JSON + diff baseline ---
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "merlin-capacity"       # `wrangler r2 bucket create merlin-capacity`

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

