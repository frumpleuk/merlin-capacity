name = "merlin-capacity"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# --- Custom subdomain. `custom_domain = true` makes `wrangler deploy` create the
#     DNS record and provision the TLS cert in the frumple.co.uk zone (already on
#     Cloudflare). Independent of the apex Hugo site — separate DNS record. ---
routes = [
  { pattern = "themeparks.frumple.co.uk", custom_domain = true }
]

# --- Static frontend (Vite build output; run `npm run build` first).
#     SPA fallback so client-routed deep links (e.g. /alton_towers/rap) resolve. ---
assets = { directory = "./dist", binding = "ASSETS", not_found_handling = "single-page-application" }

# --- Poll cadence. One cron per concern (dispatched by event.cron in index.ts).
#     Paid plan → 30s CPU per invocation, so each job just processes all its
#     parks/products in one pass. Cloudflare de-dupes identical cron strings, so
#     the two every-minute streams are spelled differently to register as two
#     independent triggers (isolated invocations).
#       "* * * * *"    queues   — live ride waits, all parks
#       "*/1 * * * *"  tickets  — accesso availability (RAP + main), all products
#       "0 * * * *"    hours    — opening-hours calendars, all parks (hourly)
#       "*/30 * * * *" rebuild  — self-heal ticket month files from D1
#       "0 7 * * *"    pre-open — 07:00 GMT: catalog rebuilds + package discovery ---
[triggers]
crons = ["* * * * *", "*/1 * * * *", "0 * * * *", "*/30 * * * *", "0 7 * * *"]

# --- History / source of truth ---
[[d1_databases]]
binding = "DB"
database_name = "merlin-capacity"
database_id = "5e01c308-630f-4409-a303-4262e8f503c5"

# --- Precomputed served JSON + diff baseline ---
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "merlin-capacity"       # `wrangler r2 bucket create merlin-capacity`

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

